name: Publish to PyPI

on:
  push:
    tags:
      - "v*"   # Trigger khi push tag kiểu v1.0.0, v1.1.1...

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write  

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          pip install hatch
          hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
